<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>입시플래너</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f8f7f4;
      }

      .startup {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #4b5563;
        padding: 24px;
        text-align: center;
      }

      .startup-card {
        max-width: 520px;
      }

      .startup-title {
        font-size: 18px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 8px;
      }

      .startup-detail {
        font-size: 14px;
        line-height: 1.7;
      }

      .startup-code {
        display: inline-block;
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #e5e7eb;
        color: #1d4ed8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup">
        <div class="startup-card">
          <div class="startup-title">입시플래너를 불러오는 중...</div>
          <div class="startup-detail">잠시만 기다려주세요.</div>
        </div>
      </div>
    </div>
    <script>
      window.__UC_APP_MOUNTED__ = false;
      window.setTimeout(function () {
        if (window.__UC_APP_MOUNTED__) return;

        var root = document.getElementById("root");
        if (!root) return;

        root.innerHTML =
          '<div class="startup"><div class="startup-card">' +
          '<div class="startup-title">앱을 불러오지 못했습니다</div>' +
          '<div class="startup-detail">현재 주소가 <strong>127.0.0.1:5500</strong>이면 Live Server로 연 상태입니다. 이 React 앱은 Vite 서버에서 열어야 합니다.</div>' +
          '<div class="startup-code">http://127.0.0.1:5173/</div>' +
          '</div></div>';
      }, 3500);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
